<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dheekshitha Lavanya — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0c0d;
    --panel:#161618;
    --border:#2a2a2d;
    --text:#f2f2f0;
    --muted:#9a9a9f;
    --accent:#86d418;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    line-height:1.5;
    min-height:100vh;
  }
  h1{font-family:'Space Grotesk',sans-serif;}
  a{color:inherit;text-decoration:none;}
  header{
    border-bottom:1px solid var(--border);
  }
  .nav-wrap{
    max-width:1200px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 32px;
  }
  .logo{
    font-weight:700;
    font-size:18px;
    letter-spacing:0.5px;
  }
  .logo span{color:var(--accent);}

  nav.primary-nav{
    display:flex;
    gap:8px;
  }
  nav.primary-nav button{
    background:none;
    border:none;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    font-weight:500;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
  }
  nav.primary-nav button.active{color:var(--bg);background:var(--accent);}

  .social-icons{display:flex;gap:14px;align-items:center;}
  .social-icons a{
    width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--muted);
  }
  .social-icons svg{width:16px;height:16px;}

  .menu-toggle{
    display:none;
    background:none;border:none;color:var(--text);
    font-size:24px;cursor:pointer;
  }
  main{max-width:1200px;margin:0 auto;padding:72px 32px;}
  .hero{
    display:grid;
    grid-template-columns:1.1fr 0.9fr;
    gap:40px;
    align-items:center;
  }
  .hero h1{
    font-size:52px;
    font-weight:700;
    line-height:1.1;
    margin-bottom:20px;
  }
  .hero p.intro{
    color:var(--muted);
    font-size:16px;
    max-width:460px;
    margin-bottom:32px;
  }
  .btn-primary{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--accent);
    color:#0c0c0d;
    font-weight:600;
    font-size:15px;
    padding:14px 26px;
    border-radius:10px;
    border:none;
    cursor:pointer;
  }

  .avatar-wrap{display:flex;justify-content:center;}
  .avatar-ring{
    width:280px;height:280px;
    border-radius:50%;
    background:linear-gradient(160deg,#3a4a3f,#1c2520);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 1px var(--border);
  }
  .avatar-ring svg{width:55%;height:55%;color:#5a6a5e;}

  .worked-with{margin-top:72px;}
  .section-label{
    color:var(--accent);
    font-size:13px;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .logo-row{
    display:flex;
    flex-wrap:wrap;
    gap:36px;
    align-items:center;
    color:var(--muted);
    font-weight:600;
    font-size:15px;
    opacity:.6;
  }
  @media (max-width:860px){
    .hero{grid-template-columns:1fr;}
    .avatar-wrap{order:-1;}
    .avatar-ring{width:180px;height:180px;}
    .hero h1{font-size:38px;}
    nav.primary-nav{
      display:none;
      flex-direction:column;
      position:absolute;
      top:100%;left:0;right:0;
      background:var(--bg);
      border-bottom:1px solid var(--border);
      padding:12px;
      gap:4px;
    }
    nav.primary-nav.open{display:flex;}
    .menu-toggle{display:block;}
    header{position:relative;}
  }
</style>
</head>
<body>

<header>
  <div class="nav-wrap">
    <div class="logo">DL<span>.</span></div>

    <nav class="primary-nav" id="primaryNav">
      <button class="active">Home</button>
      <button>Case Studies</button>
      <button>Testimonials</button>
      <button>Recent work</button>
      <button>Get In Touch</button>
    </nav>

    <div style="display:flex;align-items:center;gap:14px;">
      <div class="social-icons">
        <a href="#" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3V9zm7 0h3.8v1.7h.05c.53-1 1.83-2 3.77-2 4.03 0 4.78 2.5 4.78 5.76V21h-4v-5.8c0-1.4-.03-3.2-1.96-3.2-1.96 0-2.26 1.5-2.26 3.1V21h-4V9z"/></svg></a>
        <a href="#" aria-label="Behance"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 7.2h-5.1V5.6H22v1.6zM7.6 12.1c.9-.4 1.4-1.2 1.4-2.3 0-2.1-1.6-3-3.7-3H1v13.7h4.6c2.2 0 4.3-1 4.3-3.5 0-1.4-.7-2.5-2.3-2.9zM3.4 9.1h1.9c.9 0 1.7.3 1.7 1.3 0 1-.6 1.4-1.6 1.4H3.4V9.1zm2.1 9H3.4v-3h2.2c1.1 0 1.9.5 1.9 1.5 0 1.1-.9 1.5-2 1.5zM17.1 9.6c-3 0-4.9 2.1-4.9 5.1 0 3.1 1.8 5 5 5 2.2 0 3.9-1 4.5-3h-2.5c-.2.7-1 1.2-1.9 1.2-1.5 0-2.3-.9-2.4-2.4h7c.1-3.4-1.5-5.9-4.8-5.9zm-2.2 4c.2-1.2 1-1.9 2.1-1.9 1.2 0 1.9.8 2 1.9h-4.1z"/></svg></a>
        <a href="#" aria-label="Twitter"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 5.9c-.7.3-1.5.6-2.3.7.8-.5 1.4-1.3 1.7-2.3-.8.5-1.7.8-2.6 1-.8-.8-1.8-1.3-3-1.3-2.3 0-4.1 1.9-4.1 4.1 0 .3 0 .6.1.9-3.4-.2-6.4-1.8-8.4-4.3-.4.6-.6 1.3-.6 2.1 0 1.4.7 2.7 1.9 3.4-.7 0-1.3-.2-1.9-.5 0 2 1.4 3.6 3.3 4-.4.1-.7.1-1.1.1-.3 0-.5 0-.8-.1.5 1.6 2.1 2.8 3.9 2.8-1.5 1.2-3.3 1.8-5.3 1.8-.3 0-.7 0-1-.1 1.9 1.3 4.2 2 6.7 2 8 0 12.4-6.6 12.4-12.4v-.6c.8-.6 1.5-1.3 2.1-2.2z"/></svg></a>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
    </div>
  </div>
</header>

<main>
  <div class="hero">
    <div>
      <h1>Dheekshitha Lavanya</h1>
      <p class="intro">An Engineeering Student interested in developing Technical skills.</p>
      <button class="btn-primary">Let's get started →</button>
    </div>
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.4c-3.5 0-9.4 2-9.4 5.4v1h18.8v-1c0-3.4-5.9-5.4-9.4-5.4z"/></svg>
      </div>
    </div>
  </div>

  <div class="worked-with">
    <div class="section-label">Worked with</div>
    <div class="logo-row">
      <div>ClickUp</div>
      <div>Dropbox</div>
      <div>PAYCHEX</div>
      <div>elastic</div>
      <div>stripe</div>
    </div>
  </div>
</main>

<script>
  // Mobile menu open/close only — no section switching, page stays static
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('primaryNav').classList.toggle('open');
  });
</script>

</body>
</html>
