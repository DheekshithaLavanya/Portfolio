<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Deposit Calculator</title>
    <link rel="stylesheet" href="FDC.css">
</head>
<body>

    <div class="calculator-container">
        <h2>FD Calculator</h2>
        
        <!-- Interest Rate Slider -->
        <div class="slider-group">
            <label for="rate">Interest Rate (%): <span id="rate-val">7.5</span>%</label>
            <input type="range" id="rate" min="0" max="15" step="0.1" value="7.5">
        </div>

        <!-- Amount Slider -->
        <div class="slider-group">
            <label for="amount">Principal Amount: ₹<span id="amount-val">7500</span></label>
            <input type="range" id="amount" min="5000" max="10000" step="100" value="7500">
        </div>

        <!-- Duration Slider -->
        <div class="slider-group">
            <label for="duration">Duration: <span id="duration-val">12</span> Months</label>
            <input type="range" id="duration" min="3" max="96" step="1" value="12">
        </div>

        <button id="calculate-btn">Calculate</button>

        <!-- Result Display -->
        <div class="result-box" id="result-box">
            <h3>Maturity Details</h3>
            <p>Invested Amount: <span id="res-amount">₹0</span></p>
            <p>Interest Earned: <span id="res-interest">₹0</span></p>
            <p class="total">Total Maturity Amount: <span id="res-total">₹0</span></p>
        </div>
    </div>

    <script src="FDC.js"></script>
</body>
</html>
