<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock Demo</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
        }
        #current-clock, #exact-clock {
            font-size: 4rem;
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body>
    <div id="current-clock"></div>
    <div id="exact-clock"></div>
    <script src="clock.js"></script>
</body>
</html>
